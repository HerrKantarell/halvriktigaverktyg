<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Advisor — Cykelkläder efter väder</title>
<meta name="description" content="Välj startpunkt på kartan, hämta aktuellt väder och få klädrekommendationer för din cykeltur.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1012;
  --surface:  #17191d;
  --surface2: #1e2026;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #dddfe4;
  --muted:    #6b7280;
  --hint:     #3d4250;
  --accent:   #f0a030;
  --accent2:  #4a9eda;
  --success:  #41b87a;
  --danger:   #e05555;
  --warning:  #d97706;
  --purple:   #8b78e6;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', 'Courier New', monospace;
  --radius:   6px;
  --radius-lg: 10px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
header {
  flex-shrink: 0;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 1001;
}

.brand {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent);
  flex-shrink: 0;
}

.brand-sep { color: var(--hint); margin: 0 2px; }

.location-bar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.location-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.location-coords {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.dot-sep { width: 4px; height: 4px; border-radius: 50%; background: var(--hint); flex-shrink: 0; }

.status-chip {
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  color: var(--muted);
  transition: all 0.2s;
}
.status-chip.loading { border-color: var(--accent); color: var(--accent); }
.status-chip.ready   { border-color: var(--success); color: var(--success); }
.status-chip.error   { border-color: var(--danger);  color: var(--danger);  }

/* ── Body split ── */
.body-row { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.panel-left {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hint) transparent;
}

.panel-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}

.panel-section:last-child { border-bottom: none; }

.sec-head {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── Weather cells ── */
.weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

.w-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.w-cell .wl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.w-cell .wv {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}

.w-cell .wu { font-size: 11px; color: var(--muted); }
.w-cell.hi-cell { border-color: rgba(74,158,218,0.35); }
.w-cell.hi-cell .wv { color: var(--accent2); }

.weather-desc {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Sliders ── */
.slider-block { margin-bottom: 14px; }
.slider-block:last-child { margin-bottom: 0; }

.slider-hd {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.slider-hd .sl-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.slider-hd .sl-val {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  cursor: pointer;
  transition: transform 0.1s;
}

input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

/* ── Intensity buttons ── */
.int-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }

.int-btn {
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  padding: 7px 4px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.int-btn:hover { border-color: var(--accent); color: var(--accent); }
.int-btn.active { background: rgba(240,160,48,0.12); border-color: var(--accent); color: var(--accent); }

/* ── Map ── */
#map { flex: 1; z-index: 1; }

/* Dark tile filter */
.leaflet-tile-pane { filter: brightness(0.55) saturate(0.5) hue-rotate(5deg); }

/* Leaflet popup */
.leaflet-popup-content-wrapper {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg) !important;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-content { margin: 12px 16px; }
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-color: var(--border2) !important;
}
.leaflet-control-zoom a:hover { background: var(--surface2) !important; }
.leaflet-control-attribution {
  background: rgba(15,16,18,0.7) !important;
  color: var(--muted) !important;
  font-size: 10px !important;
}
.leaflet-control-attribution a { color: var(--muted) !important; }

/* ── Right panel ── */
.panel-right {
  width: 270px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--hint) transparent;
}

/* ── Effective temp block ── */
.eff-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.eff-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.eff-breakdown {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.8;
}

.eff-number {
  font-family: var(--font-mono);
  font-size: 42px;
  font-weight: 300;
  line-height: 1;
  text-align: right;
}

/* ── Kit items ── */
.alert-row {
  background: rgba(224,85,85,0.08);
  border: 1px solid rgba(224,85,85,0.25);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--danger);
  margin-bottom: 6px;
  line-height: 1.4;
}

.alert-row.warn {
  background: rgba(217,119,6,0.08);
  border-color: rgba(217,119,6,0.25);
  color: var(--warning);
}

.kit-row {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.kit-row:last-child { border-bottom: none; }

.kit-badge {
  width: 32px;
  height: 32px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

.kit-body {}

.kit-cat {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.kit-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.kit-note { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

/* ── Map pulse marker ── */
@keyframes pulse-ring {
  0%   { transform: scale(0.6); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}

.pulse-marker {
  position: relative;
  width: 14px;
  height: 14px;
}

.pulse-marker .core {
  position: absolute;
  top: 0; left: 0;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
}

.pulse-marker .ring {
  position: absolute;
  top: 0; left: 0;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
  animation: pulse-ring 1.8s ease-out infinite;
}

/* ── Placeholder / loading states ── */
.empty-state {
  padding: 20px 0;
  text-align: center;
  color: var(--hint);
  font-size: 12px;
  font-style: italic;
}

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
  padding: 8px 0;
}

/* ── Map click hint ── */
.map-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 12px;
  color: var(--muted);
  pointer-events: none;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--hint); border-radius: 2px; }

/* ── Responsive: collapse right panel on narrow screens ── */
@media (max-width: 900px) {
  .panel-left { width: 240px; }
  .panel-right { width: 230px; }
}

@media (max-width: 720px) {
  .body-row { flex-direction: column; }
  .panel-left, .panel-right { width: 100%; max-height: 220px; border: none; border-bottom: 1px solid var(--border); }
  #map { min-height: 260px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="brand">KIT<span class="brand-sep">/</span>ADVISOR</div>
    <div class="dot-sep"></div>
    <div class="location-bar">
      <div class="location-name" id="locName">Klicka på kartan för att välja startpunkt</div>
      <div class="location-coords" id="locCoords"></div>
    </div>
    <div class="status-chip" id="statusChip">VÄNTAR</div>
  </header>

  <!-- MAIN BODY -->
  <div class="body-row">

    <!-- LEFT: Weather + params -->
    <div class="panel-left">

      <!-- Weather -->
      <div class="panel-section">
        <div class="sec-head">Väder just nu</div>
        <div id="weatherArea">
          <div class="empty-state">Välj plats på kartan</div>
        </div>
      </div>

      <!-- Ride params -->
      <div class="panel-section">
        <div class="sec-head">Turkonfiguration</div>

        <div class="slider-block">
          <div class="slider-hd">
            <span class="sl-name">Längd</span>
            <span class="sl-val" id="durLabel">2.0 h</span>
          </div>
          <input type="range" id="durSlider" min="0.5" max="8" step="0.5" value="2">
        </div>

        <div class="slider-block">
          <div class="slider-hd">
            <span class="sl-name">Snitthastighet</span>
            <span class="sl-val" id="speedLabel">28 km/h</span>
          </div>
          <input type="range" id="speedSlider" min="14" max="44" step="2" value="28">
        </div>

        <div class="slider-block">
          <div class="slider-hd">
            <span class="sl-name">Intensitet</span>
          </div>
          <div class="int-grid">
            <button class="int-btn active" data-int="easy">Lugn</button>
            <button class="int-btn"        data-int="mod">Tempo</button>
            <button class="int-btn"        data-int="hard">Hård</button>
          </div>
        </div>
      </div>

    </div>

    <!-- MIDDLE: Map -->
    <div style="position:relative; flex:1; min-width:0; height:100%;">
      <div id="map"></div>
      <div class="map-hint" id="mapHint">↓ Klicka var som helst på kartan</div>
    </div>

    <!-- RIGHT: Analysis + kit -->
    <div class="panel-right">

      <div class="panel-section">
        <div class="sec-head">Analys</div>
        <div id="analysisArea">
          <div class="empty-state">Välj plats för beräkning</div>
        </div>
      </div>

      <div class="panel-section" style="flex:1;">
        <div class="sec-head">Utrustning</div>
        <div id="kitArea">
          <div class="empty-state">Välj plats för rekommendationer</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════
const map = L.map('map', {
  center: [55.676, 12.568],
  zoom: 9,
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

// Custom pulsing marker
const pulseIcon = L.divIcon({
  html: `<div class="pulse-marker"><div class="ring"></div><div class="core"></div></div>`,
  className: '',
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});

let marker = null;
let currentWeather = null;
let intensity = 'easy';

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
function setStatus(state, text) {
  const el = document.getElementById('statusChip');
  el.className = 'status-chip ' + state;
  el.textContent = text;
}

// ═══════════════════════════════════════════════
//  MAP CLICK
// ═══════════════════════════════════════════════
map.on('click', async (e) => {
  const { lat, lng } = e.latlng;
  placeMarker(lat, lng);
  document.getElementById('mapHint').style.display = 'none';
  document.getElementById('locCoords').textContent = `${lat.toFixed(4)}° N  ${lng.toFixed(4)}° E`;
  setStatus('loading', 'HÄMTAR…');
  document.getElementById('weatherArea').innerHTML = '<div class="loading-row"><span class="spinner"></span>Hämtar väderdata…</div>';
  document.getElementById('analysisArea').innerHTML = '<div class="empty-state">Väntar på väder…</div>';
  document.getElementById('kitArea').innerHTML = '<div class="empty-state">Väntar på väder…</div>';

  try {
    const [weather, locName] = await Promise.all([
      fetchWeather(lat, lng),
      reverseGeocode(lat, lng)
    ]);
    currentWeather = weather;
    document.getElementById('locName').textContent = locName;
    renderWeather(weather);
    renderAnalysis();
    setStatus('ready', 'KLAR');
  } catch (err) {
    console.error(err);
    document.getElementById('weatherArea').innerHTML = '<div class="alert-row">Kunde inte hämta väderdata. Kontrollera nätverket.</div>';
    setStatus('error', 'FEL');
  }
});

function placeMarker(lat, lng) {
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
}

// ═══════════════════════════════════════════════
//  OPEN-METEO
// ═══════════════════════════════════════════════
async function fetchWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_gusts_10m,precipitation,relative_humidity_2m,weather_code,cloud_cover&wind_speed_unit=kmh&timezone=auto`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Weather API error');
  const data = await res.json();
  const c = data.current;
  return {
    temp:     c.temperature_2m,
    apparent: c.apparent_temperature,
    wind:     c.wind_speed_10m,
    gusts:    c.wind_gusts_10m,
    precip:   c.precipitation,
    humidity: c.relative_humidity_2m,
    wcode:    c.weather_code,
    cloud:    c.cloud_cover
  };
}

// ═══════════════════════════════════════════════
//  NOMINATIM REVERSE GEOCODE
// ═══════════════════════════════════════════════
async function reverseGeocode(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=sv`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'sv' } });
    const d = await res.json();
    const a = d.address || {};
    const city = a.city || a.town || a.village || a.municipality || a.county || 'Okänd plats';
    const country = a.country || '';
    return country ? `${city}, ${country}` : city;
  } catch {
    return 'Plats vald';
  }
}

// ═══════════════════════════════════════════════
//  WEATHER RENDER
// ═══════════════════════════════════════════════
function wDesc(code) {
  if (code === 0)       return { icon: '☀️', text: 'Klart' };
  if (code <= 3)        return { icon: '⛅', text: 'Delvis molnigt' };
  if (code <= 48)       return { icon: '🌫️', text: 'Dimma' };
  if (code <= 55)       return { icon: '🌦️', text: 'Duggregn' };
  if (code <= 67)       return { icon: '🌧️', text: 'Regn' };
  if (code <= 77)       return { icon: '❄️', text: 'Snö' };
  if (code <= 82)       return { icon: '🌦️', text: 'Regnskurar' };
  return { icon: '⛈️', text: 'Åska' };
}

function renderWeather(w) {
  const d = wDesc(w.wcode);
  document.getElementById('weatherArea').innerHTML = `
    <div class="weather-grid">
      <div class="w-cell hi-cell">
        <div class="wl">Temp</div>
        <div class="wv">${w.temp.toFixed(1)}<span class="wu"> °C</span></div>
      </div>
      <div class="w-cell">
        <div class="wl">Vind</div>
        <div class="wv">${Math.round(w.wind)}<span class="wu"> km/h</span></div>
      </div>
      <div class="w-cell">
        <div class="wl">Fuktighet</div>
        <div class="wv">${Math.round(w.humidity)}<span class="wu"> %</span></div>
      </div>
      <div class="w-cell">
        <div class="wl">Byar</div>
        <div class="wv">${Math.round(w.gusts)}<span class="wu"> km/h</span></div>
      </div>
    </div>
    <div class="weather-desc">${d.icon} ${d.text}${w.precip > 0 ? ` · ${w.precip.toFixed(1)} mm` : ''}</div>
  `;
}

// ═══════════════════════════════════════════════
//  FORMULA ENGINE
// ═══════════════════════════════════════════════
function calcWindChill(T, V) {
  if (T >= 10 || V < 4.8) return T;
  return 13.12 + 0.6215 * T - 11.37 * Math.pow(V, 0.16) + 0.3965 * T * Math.pow(V, 0.16);
}

function calcEffective(weather) {
  const T       = weather.temp;
  const windAmb = weather.wind;
  const speed   = parseInt(document.getElementById('speedSlider').value);
  const dur     = parseFloat(document.getElementById('durSlider').value);

  const effWind  = windAmb + speed;
  const wc       = calcWindChill(T, effWind);

  const effortMap  = { easy: 4, mod: 7, hard: 11 };
  const effort     = effortMap[intensity];
  const durPenalty = dur > 3 ? -2 : dur > 1.5 ? -1 : 0;
  const humPenalty = weather.humidity > 85 ? -2 : 0;

  return {
    eff: Math.round((wc + effort + durPenalty + humPenalty) * 10) / 10,
    wc:  Math.round(wc * 10) / 10,
    effort, durPenalty, humPenalty
  };
}

// ═══════════════════════════════════════════════
//  ANALYSIS RENDER
// ═══════════════════════════════════════════════
function renderAnalysis() {
  if (!currentWeather) return;
  const { eff, wc, effort, durPenalty, humPenalty } = calcEffective(currentWeather);

  let color = '#41b87a';
  if (eff < 13) color = '#4a9eda';
  if (eff < 6)  color = '#8b78e6';
  if (eff < 0)  color = '#b060e8';
  if (eff > 24) color = '#e05555';

  let breakdown = `Vindkyla: ${wc}°C<br>Ansträngning: +${effort}°C`;
  if (durPenalty < 0) breakdown += `<br>Turlängd: ${durPenalty}°C`;
  if (humPenalty < 0) breakdown += `<br>Hög fukt: ${humPenalty}°C`;

  document.getElementById('analysisArea').innerHTML = `
    <div class="eff-block">
      <div>
        <div class="eff-label">Upplevd temp</div>
        <div class="eff-breakdown">${breakdown}</div>
      </div>
      <div class="eff-number" style="color:${color}">${eff > 0 ? '+' : ''}${eff}°</div>
    </div>
  `;

  renderKit(eff);
}

// ═══════════════════════════════════════════════
//  KIT ENGINE
// ═══════════════════════════════════════════════
function renderKit(eff) {
  const w   = currentWeather;
  const dur = parseFloat(document.getElementById('durSlider').value);
  const isRain  = w.precip > 0.3 || w.wcode >= 51;
  const isLight = w.precip > 0   || w.wcode >= 51;

  let items  = [];
  let alerts = [];
  let accentColor = '#41b87a';
  if (eff < 12) accentColor = '#4a9eda';
  if (eff < 5)  accentColor = '#8b78e6';
  if (eff < 0)  accentColor = '#b060e8';

  const bg = accentColor + '18';

  if (eff >= 22) {
    items.push({ icon:'🎽', cat:'Överkropp', name:'Kortärmad jersey', note:'Mesh för maximal ventilation' });
    items.push({ icon:'🩳', cat:'Underkropp', name:'Bib shorts', note:'' });
  } else if (eff >= 17) {
    items.push({ icon:'🎽', cat:'Överkropp', name:'Jersey + armvärmare', note:'Rulla ned vid uppvärmning' });
    items.push({ icon:'🩳', cat:'Underkropp', name:'Bib shorts', note:'' });
    items.push({ icon:'🧤', cat:'Händer', name:'Lätta fingerhandskar', note:'Valfritt vid vindkänsla' });
  } else if (eff >= 12) {
    items.push({ icon:'👕', cat:'Överkropp', name:'Långärmad jersey', note:'Alt. kortärmad + baslager' });
    items.push({ icon:'🩳', cat:'Underkropp', name:'Bib shorts', note:'Alt. lätta knäskydd' });
    items.push({ icon:'🧤', cat:'Händer', name:'Tunna handskar', note:'' });
    items.push({ icon:'👂', cat:'Huvud', name:'Öronvärmare', note:'' });
  } else if (eff >= 7) {
    items.push({ icon:'🧥', cat:'Överkropp', name:'Termojersey + baslager', note:'Fukttransporterande inre lager' });
    items.push({ icon:'👖', cat:'Underkropp', name:'Bibtights', note:'' });
    items.push({ icon:'🧤', cat:'Händer', name:'Vinterhandskar', note:'' });
    items.push({ icon:'👂', cat:'Huvud', name:'Öronvärmare / pannband', note:'' });
  } else if (eff >= 2) {
    items.push({ icon:'🧥', cat:'Överkropp', name:'Vinterjacka + termolinne', note:'Vindtät ytterlager kritiskt' });
    items.push({ icon:'👖', cat:'Underkropp', name:'Vinter-bibtights', note:'' });
    items.push({ icon:'🧤', cat:'Händer', name:'Tjocka vinterhandskar', note:'Ev. överdragsvantar' });
    items.push({ icon:'🎿', cat:'Huvud', name:'Mössa under hjälm', note:'' });
    items.push({ icon:'🦶', cat:'Fötter', name:'Skoöverdrag / termosockor', note:'' });
  } else {
    items.push({ icon:'🧥', cat:'Överkropp', name:'Dubbellagring + vindtät jacka', note:'' });
    items.push({ icon:'👖', cat:'Underkropp', name:'Vinter-bibtights + underställ', note:'' });
    items.push({ icon:'🧤', cat:'Händer', name:'Extremhandskar / lobstervantar', note:'' });
    items.push({ icon:'🎿', cat:'Huvud', name:'Balaclava + mössa', note:'' });
    items.push({ icon:'🦶', cat:'Fötter', name:'Vintersko + skoöverdrag', note:'' });
    alerts.push({ type:'danger', msg:'Extremt kallt — risk för köldskador. Korta turen om möjligt.' });
  }

  if (isRain) {
    items.push({ icon:'🌧️', cat:'Regnskydd', name:'Vattenavvisande jacka', note:'Syntet — inte bomull' });
    items.push({ icon:'👓', cat:'Ögon', name:'Glasögon / visir', note:'Skyddar mot stänk och sot' });
    if (w.wcode >= 65 || w.precip > 2) {
      items.push({ icon:'🦶', cat:'Fötter', name:'Vattentäta skoöverdrag', note:'' });
      alerts.push({ type:'warn', msg:'Kraftigt regn — kläder av bomull torkar inte. Allt i syntet.' });
    } else {
      alerts.push({ type:'warn', msg:'Regnrisk — välj syntetfibrer, undvik bomull.' });
    }
  }

  if (dur > 3) {
    items.push({ icon:'🎒', cat:'Packa med', name:'Vindväst i bakfickan', note:'Du kyls ned mot slutet av långtur' });
  }

  if (w.gusts > 50) {
    alerts.push({ type:'warn', msg:`Kraftiga byar (${Math.round(w.gusts)} km/h) — var försiktig i exponerat läge.` });
  }

  let html = '';
  alerts.forEach(a => {
    html += `<div class="alert-row ${a.type === 'warn' ? 'warn' : ''}">${a.msg}</div>`;
  });

  items.forEach(item => {
    html += `
      <div class="kit-row">
        <div class="kit-badge" style="background:${bg}">${item.icon}</div>
        <div class="kit-body">
          <div class="kit-cat">${item.cat}</div>
          <div class="kit-name">${item.name}</div>
          ${item.note ? `<div class="kit-note">${item.note}</div>` : ''}
        </div>
      </div>
    `;
  });

  document.getElementById('kitArea').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════
document.getElementById('durSlider').addEventListener('input', function() {
  document.getElementById('durLabel').textContent = parseFloat(this.value).toFixed(1) + ' h';
  if (currentWeather) renderAnalysis();
});

document.getElementById('speedSlider').addEventListener('input', function() {
  document.getElementById('speedLabel').textContent = this.value + ' km/h';
  if (currentWeather) renderAnalysis();
});

document.querySelectorAll('.int-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.int-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    intensity = this.dataset.int;
    if (currentWeather) renderAnalysis();
  });
});

// ═══════════════════════════════════════════════
//  INIT — pre-load Copenhagen
// ═══════════════════════════════════════════════
(async () => {
  const lat = 55.6761, lng = 12.5683;
  placeMarker(lat, lng);
  document.getElementById('locCoords').textContent = `${lat}° N  ${lng}° E`;
  document.getElementById('mapHint').style.display = 'none';
  setStatus('loading', 'HÄMTAR…');
  document.getElementById('weatherArea').innerHTML = '<div class="loading-row"><span class="spinner"></span>Hämtar väder för Köpenhamn…</div>';

  try {
    const [weather, locName] = await Promise.all([
      fetchWeather(lat, lng),
      reverseGeocode(lat, lng)
    ]);
    currentWeather = weather;
    document.getElementById('locName').textContent = locName;
    renderWeather(weather);
    renderAnalysis();
    setStatus('ready', 'KLAR');
  } catch {
    document.getElementById('weatherArea').innerHTML = '<div class="alert-row">Kunde inte hämta väderdata.</div>';
    setStatus('error', 'FEL');
  }
})();
</script>
