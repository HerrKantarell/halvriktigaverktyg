<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Holmes Chronicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --k-ink:#111111;
  --k-bg:#F7F7F5;
  --k-white:#FFFFFF;
  --k-mid:#666662;
  --k-faint:#E2E2DF;
  --k-orange:#D96B1F;
  --k-orange-t:rgba(217,107,31,0.10);
  --k-orange-tt:rgba(217,107,31,0.06);
  --k-orange-pale:#F5DFC0;
  --k-sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  --k-serif:'Playfair Display',Georgia,serif;
  --k-radius:10px;
  --k-radius-sm:7px;
  --k-border:0.5px solid var(--k-faint);
}
html,body{height:100%;overflow:hidden;background:var(--k-bg);color:var(--k-ink);font-family:var(--k-sans)}
#app{display:flex;height:100vh}

/* ── SIDEBAR ─────────────────────────────── */
#sidebar{
  width:300px;min-width:300px;height:100%;
  background:var(--k-white);
  border-right:var(--k-border);
  display:flex;flex-direction:column;overflow:hidden;
}
#hdr{padding:20px 20px 16px;border-bottom:var(--k-border);flex-shrink:0}
.eyebrow{
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--k-mid);margin-bottom:6px;
}
.apptitle{
  font-family:var(--k-serif);font-style:italic;font-weight:400;
  font-size:22px;color:var(--k-ink);line-height:1.2;margin-bottom:2px;
}
.appsub{font-size:12px;color:var(--k-mid);margin-bottom:12px}
.orn{
  display:flex;align-items:center;gap:8px;
  font-size:10px;color:var(--k-orange);
}
.orn::before,.orn::after{content:'';flex:1;height:0.5px;background:var(--k-faint)}

#ctls{
  padding:8px 14px;display:flex;gap:6px;
  border-bottom:var(--k-border);flex-shrink:0;
}
.sbtn{
  font-family:var(--k-sans);font-size:11px;font-weight:500;
  color:var(--k-mid);background:none;
  border:var(--k-border);border-radius:var(--k-radius-sm);
  padding:4px 12px;cursor:pointer;
  transition:color .15s,border-color .15s,background .15s;
}
.sbtn:hover{color:var(--k-ink);border-color:var(--k-ink);background:var(--k-bg)}

#filters{
  flex:1;overflow-y:auto;padding:8px 12px 12px;
  scrollbar-width:thin;scrollbar-color:var(--k-faint) transparent;
}
.col-hdr{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--k-mid);padding:10px 8px 4px;
  border-top:var(--k-border);margin-top:4px;
}
.col-hdr:first-child{border-top:none;margin-top:0}

.srow{
  display:flex;align-items:flex-start;gap:9px;
  padding:5px 8px;border-radius:var(--k-radius-sm);
  cursor:pointer;transition:background .12s;user-select:none;
}
.srow:hover{background:var(--k-bg)}
.srow.on{background:var(--k-orange-tt)}

.chk{
  width:13px;height:13px;border:0.5px solid var(--k-faint);
  border-radius:3px;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s;
}
.srow.on .chk{background:var(--k-orange);border-color:var(--k-orange)}
.chk::after{
  content:'';display:block;width:6px;height:3px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translateY(-1px);opacity:0;transition:opacity .1s;
}
.srow.on .chk::after{opacity:1}

.sinfo{flex:1;min-width:0}
.stitle{font-size:13px;color:var(--k-ink);line-height:1.3}
.smeta{font-size:11px;color:var(--k-mid);margin-top:1px}

/* ── LOCATION PANEL ──────────────────────── */
#locpanel{
  border-top:var(--k-border);
  padding:16px 18px;flex-shrink:0;
  max-height:240px;overflow-y:auto;
  background:var(--k-white);display:none;
  scrollbar-width:thin;scrollbar-color:var(--k-faint) transparent;
}
#locpanel.vis{display:block}

.locname{
  font-family:var(--k-serif);font-style:italic;font-weight:400;
  font-size:16px;color:var(--k-ink);margin-bottom:6px;line-height:1.25;
}
.locdesc{font-size:13px;line-height:1.6;color:var(--k-ink);margin-bottom:10px}

/* Manicula callout */
.callout{
  background:var(--k-orange-tt);
  border-left:2px solid var(--k-orange);
  border-radius:0 var(--k-radius-sm) var(--k-radius-sm) 0;
  padding:10px 12px 10px 10px;
  display:flex;gap:10px;align-items:flex-start;
  margin-bottom:10px;
}
.callout svg{flex-shrink:0;margin-top:1px}
.callout p{font-size:12px;line-height:1.6;color:var(--k-ink);margin:0}

.loc-sl{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--k-mid);margin-bottom:6px;
}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{
  font-size:11px;padding:3px 9px;border-radius:100px;
  background:var(--k-orange-tt);color:var(--k-orange);
  border:0.5px solid rgba(217,107,31,0.2);
  cursor:pointer;transition:background .12s;
  font-family:var(--k-sans);
}
.tag:hover{background:var(--k-orange-t)}
.tag.off{opacity:.4}

/* ── MAP ─────────────────────────────────── */
#mapc{flex:1;height:100%;position:relative}
#map{height:100%;width:100%}

/* ── POPUPS ──────────────────────────────── */
.leaflet-popup-content-wrapper{
  background:var(--k-white)!important;
  border:var(--k-border)!important;
  border-radius:var(--k-radius)!important;
  box-shadow:0 4px 24px rgba(0,0,0,.10)!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important;width:268px!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{
  color:var(--k-mid)!important;font-size:15px!important;
  right:10px!important;top:9px!important;
  font-weight:400!important;
}
.leaflet-popup-close-button:hover{color:var(--k-ink)!important}

.pbody{padding:14px 16px}
.pname{
  font-family:var(--k-serif);font-style:italic;font-weight:400;
  font-size:14px;color:var(--k-ink);margin-bottom:5px;padding-right:16px;
  line-height:1.25;
}
.pdesc{font-size:12px;color:var(--k-ink);line-height:1.55;margin-bottom:8px}
.pcallout{
  background:var(--k-orange-tt);
  border-left:2px solid var(--k-orange);
  border-radius:0 var(--k-radius-sm) var(--k-radius-sm) 0;
  padding:8px 10px 8px 9px;
  display:flex;gap:8px;align-items:flex-start;
  margin-bottom:9px;
}
.pcallout svg{flex-shrink:0;margin-top:1px}
.pcallout p{font-size:11px;line-height:1.55;color:var(--k-ink);margin:0}
.ptags{
  display:flex;flex-wrap:wrap;gap:3px;
  padding-top:8px;border-top:var(--k-border);
}
.ptag{
  font-size:11px;padding:2px 8px;border-radius:100px;
  background:var(--k-orange-tt);color:var(--k-orange);
  border:0.5px solid rgba(217,107,31,0.2);
  font-family:var(--k-sans);
}

/* ── STATS BADGE ──────────────────────────── */
#stats{
  position:absolute;top:14px;right:14px;
  background:var(--k-white);border:var(--k-border);
  border-radius:var(--k-radius-sm);padding:6px 13px;
  z-index:1000;font-size:12px;color:var(--k-mid);
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
#stats b{
  font-family:var(--k-serif);font-style:italic;
  font-size:15px;color:var(--k-orange);font-weight:400;
}

/* ── LEGEND ──────────────────────────────── */
#legend{
  position:absolute;bottom:22px;right:14px;
  background:var(--k-white);border:var(--k-border);
  border-radius:var(--k-radius-sm);padding:10px 13px;
  z-index:1000;pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.ltitle{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--k-mid);margin-bottom:7px;
}
.li{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:12px;color:var(--k-ink)}
.li:last-child{margin-bottom:0}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ld.L{background:var(--k-orange-t);border:1.5px solid var(--k-orange)}
.ld.C{background:rgba(17,17,17,.08);border:1.5px solid var(--k-ink)}
.ld.A{background:rgba(102,102,98,.1);border:1.5px solid var(--k-mid)}

/* ── LEAFLET OVERRIDES ───────────────────── */
.leaflet-control-zoom{
  border:var(--k-border)!important;
  border-radius:var(--k-radius-sm)!important;
  box-shadow:0 2px 8px rgba(0,0,0,.06)!important;
  overflow:hidden;
}
.leaflet-control-zoom-in,.leaflet-control-zoom-out{
  background:var(--k-white)!important;color:var(--k-ink)!important;
  border-color:var(--k-faint)!important;font-size:14px!important;
}
.leaflet-control-zoom-in:hover,.leaflet-control-zoom-out:hover{
  background:var(--k-bg)!important;
}
.leaflet-control-attribution{
  background:rgba(255,255,255,.85)!important;
  color:var(--k-mid)!important;font-size:10px!important;
  border-radius:var(--k-radius-sm) 0 0 0!important;
}
.leaflet-control-attribution a{color:var(--k-mid)!important}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--k-faint);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="hdr">
      <div class="eyebrow">Arthur Conan Doyle · 1887–1927</div>
      <div class="apptitle">The Holmes Chronicles</div>
      <div class="appsub">A cartography of mysteries</div>
      <div class="orn">◆</div>
    </div>
    <div id="ctls">
      <button class="sbtn" onclick="selectAll()">Select all</button>
      <button class="sbtn" onclick="selectNone()">Clear all</button>
    </div>
    <div id="filters"></div>
    <div id="locpanel"></div>
  </div>
  <div id="mapc">
    <div id="map"></div>
    <div id="stats"><b id="vcnt">52</b> locations visible</div>
    <div id="legend">
      <div class="ltitle">Location type</div>
      <div class="li"><div class="ld L"></div>London</div>
      <div class="li"><div class="ld C"></div>Countryside</div>
      <div class="li"><div class="ld A"></div>Abroad</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

/* ── Map ──────────────────────────────────── */
let active=new Set(STORIES.map(s=>s.id));
let markers=[];
let curLoc=null;

const map=L.map('map',{center:[52,-2],zoom:6,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

const TYPECOLOR={
  L:{fill:'rgba(217,107,31,0.15)',stroke:'#D96B1F'},
  C:{fill:'rgba(17,17,17,0.10)',  stroke:'#111111'},
  A:{fill:'rgba(102,102,98,0.12)',stroke:'#666662'},
};

function mkIcon(type,dim){
  const c=TYPECOLOR[type]||TYPECOLOR.L;
  const op=dim?'0.18':'1';
  return L.divIcon({
    className:'',
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${c.fill};border:1.5px solid ${c.stroke};cursor:pointer;opacity:${op};transition:opacity .2s"></div>`,
    iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]
  });
}

function storyTitle(id){const s=STORIES.find(x=>x.id===id);return s?s.title:id}

function popupHTML(loc){
  const tags=loc.stories.map(id=>`<span class="ptag">${storyTitle(id)}</span>`).join('');
  return `<div class="pbody"><div class="pname">${loc.name}</div><div class="pdesc">${loc.desc}</div><div class="pcallout">${MANICULA}<p>${loc.fact}</p></div><div class="ptags">${tags}</div></div>`;
}

function initMarkers(){
  LOCS.forEach(loc=>{
    const dim=!loc.stories.some(id=>active.has(id));
    const m=L.marker([loc.lat,loc.lng],{icon:mkIcon(loc.type,dim)});
    m.bindPopup(popupHTML(loc),{maxWidth:290,className:'holmes-popup'});
    m.on('click',()=>showPanel(loc));
    m.addTo(map);
    markers.push({m,loc,dim});
  });
  updateCount();
}

function updateCount(){
  let v=0;markers.forEach(o=>{if(!o.dim)v++;});
  document.getElementById('vcnt').textContent=v;
}

function updateMarkers(){
  markers.forEach(o=>{
    const dim=!o.loc.stories.some(id=>active.has(id));
    if(dim!==o.dim){o.dim=dim;o.m.setIcon(mkIcon(o.loc.type,dim));}
    o.m.setPopupContent(popupHTML(o.loc));
  });
  updateCount();
  if(curLoc)showPanel(curLoc);
}

function showPanel(loc){
  curLoc=loc;
  const p=document.getElementById('locpanel');
  const tags=loc.stories.map(id=>{
    const on=active.has(id);
    return `<span class="tag${on?'':' off'}" onclick="toggle('${id}')">${storyTitle(id)}</span>`;
  }).join('');
  p.innerHTML=`<div class="locname">${loc.name}</div><div class="locdesc">${loc.desc}</div><div class="callout">${MANICULA}<p>${loc.fact}</p></div><div class="loc-sl">Appears in</div><div class="tags">${tags}</div>`;
  p.classList.add('vis');
}

function renderSidebar(){
  const c=document.getElementById('filters');c.innerHTML='';
  COLS.forEach(col=>{
    const ss=STORIES.filter(s=>s.col===col.id);
    if(!ss.length)return;
    const h=document.createElement('div');h.className='col-hdr';h.textContent=col.label;c.appendChild(h);
    ss.forEach(s=>{
      const d=document.createElement('div');
      d.className='srow'+(active.has(s.id)?' on':'');
      d.innerHTML=`<div class="chk"></div><div class="sinfo"><div class="stitle">${s.title}</div><div class="smeta">${s.year}</div></div>`;
      d.addEventListener('click',()=>toggle(s.id));
      c.appendChild(d);
    });
  });
}

function toggle(id){
  if(active.has(id))active.delete(id);else active.add(id);
  renderSidebar();updateMarkers();
}
function selectAll(){STORIES.forEach(s=>active.add(s.id));renderSidebar();updateMarkers()}
function selectNone(){active.clear();renderSidebar();updateMarkers()}

renderSidebar();
initMarkers();
</script>
</body>
</html>
